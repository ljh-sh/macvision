name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Select Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode.app
          swift --version

      - name: Build
        run: swift build -c release

      - name: Test
        run: swift test
