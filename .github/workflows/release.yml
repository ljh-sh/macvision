name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v0.0.0)'
        required: true
        default: v0.0.0-test

permissions: read-all

jobs:
  build:
    name: Build (arm64 + x64 on Apple Silicon)
    runs-on: macos-14
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Select Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode.app
          swift --version
          xcrun --show-sdk-version

      - name: Build & package both arches
        env:
          SOURCE_DATE_EPOCH: 1700000000
          ZERO_AR_DATE: 1
          TZ: UTC
          LC_ALL: C
        run: .x-cmd/release release

      - name: Verify reproducibility & no privacy leaks
        run: .x-cmd/release verify darwin-arm64

      - name: List artifacts
        run: ls -la .release-artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-artifacts
          path: |
            .release-artifacts/macvision-darwin-arm64.tar.xz
            .release-artifacts/macvision-darwin-x64.tar.xz
            .release-artifacts/macvision-darwin-universal.tar.xz
            .release-artifacts/BUILD_INFO.txt
            .release-artifacts/SHA256SUMS

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      id-token: write
    outputs:
      tag: ${{ steps.tag.outputs.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Determine tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF: ${{ github.ref }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "name=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "name=${REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts
          path: artifacts

      - name: List artifacts
        run: ls -laR artifacts

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign release artifacts
        run: |
          for f in artifacts/*.tar.xz artifacts/SHA256SUMS artifacts/BUILD_INFO.txt; do
            [ -f "$f" ] || continue
            cosign sign-blob --yes --bundle="${f}.sigstore.json" "$f"
          done

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            artifacts/macvision-darwin-*.tar.xz
            artifacts/SHA256SUMS
            artifacts/BUILD_INFO.txt
            artifacts/*.sigstore.json

  # --- SLSA provenance (automatic for every release) -------------------------
  # Generates and attaches a signed build-provenance attestation so downloaders
  # can verify a binary was built by this CI from this source. Replaces the
  # manual retrofit-slsa.yml step for new releases.
  provenance-prep:
    name: SLSA subjects
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          mkdir -p assets
          gh release download "$TAG" -R "${{ github.repository }}" -D assets \
            --pattern 'macvision-*.tar.xz' \
            --pattern 'BUILD_INFO.txt' \
            --pattern 'SHA256SUMS'
      - name: Hash subjects
        id: hash
        working-directory: assets
        run: |
          hashes=$(sha256sum macvision-*.tar.xz BUILD_INFO.txt SHA256SUMS | base64 -w0)
          echo "hashes=$hashes" >> "$GITHUB_OUTPUT"

  provenance:
    name: Generate SLSA provenance
    needs: provenance-prep
    permissions:
      actions: read
      id-token: write
      contents: write
    # The SLSA reusable workflow must be referenced by semver tag, not SHA.
    # Audit anchor for v2.1.0: f7dd8c54c2067bafc12ca7a55595d5ee9b75204a
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.provenance-prep.outputs.hashes }}"
      upload-assets: false

  provenance-upload:
    name: Attach provenance to release
    needs: [release, provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download provenance
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.provenance.outputs.provenance-name }}
          path: provenance
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          gh release upload "$TAG" -R "${{ github.repository }}" \
            "provenance/${{ needs.provenance.outputs.provenance-name }}" --clobber
