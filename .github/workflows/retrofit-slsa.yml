name: Retrofit SLSA provenance

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to add provenance to (e.g. v0.1.0)'
        required: true

permissions: read-all

jobs:
  prepare:
    name: Download release assets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
      tag: ${{ github.event.inputs.tag }}
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          gh release download "${{ github.event.inputs.tag }}" \
            -R "${{ github.repository }}" \
            -D assets \
            --pattern 'macvision-*.tar.xz' \
            --pattern 'BUILD_INFO.txt' \
            --pattern 'SHA256SUMS'

      - name: Generate SLSA provenance subjects
        id: hash
        working-directory: assets
        run: |
          hashes=$(sha256sum macvision-*.tar.xz BUILD_INFO.txt SHA256SUMS | base64 -w0)
          echo "hashes=$hashes" >> "$GITHUB_OUTPUT"

  provenance:
    name: Generate SLSA provenance
    needs: prepare
    permissions:
      actions: read
      id-token: write
      contents: write
    # The SLSA reusable workflow must be referenced by semver tag, not SHA.
    # Audit anchor for v2.1.0: f7dd8c54c2067bafc12ca7a55595d5ee9b75204a
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.prepare.outputs.hashes }}"
      upload-assets: false

  upload:
    name: Upload provenance to release
    needs: [prepare, provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download provenance
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.provenance.outputs.provenance-name }}
          path: provenance

      - name: Upload provenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.prepare.outputs.tag }}" \
            -R "${{ github.repository }}" \
            "provenance/${{ needs.provenance.outputs.provenance-name }}" \
            --clobber
