title: macvision
description: Private macOS vision for AI agents — on-device OCR and image understanding via Apple's Vision framework. No cloud, no model, no per-call cost.
baseurl: "/macvision"
url: "https://ljh-sh.github.io"

permalink: pretty

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-relative-links
  - jekyll-sitemap

relative_links:
  enabled: true
  collections: true

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
