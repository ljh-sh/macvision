title: macvision
description: Turn any image into agent-friendly JSON — local macOS OCR and image understanding via Apple's Vision framework. No model download, no uploads, no per-call cost.
baseurl: "/macvision"
url: "https://ljh-sh.github.io"

permalink: pretty

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-relative-links
  - jekyll-sitemap

relative_links:
  enabled: true
  collections: true

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
